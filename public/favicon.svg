<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13301f"/>
      <stop offset="1" stop-color="#0f1411"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d27e"/>
      <stop offset="1" stop-color="#1f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- schema ad albero: nodo radice -> due rami -> quattro foglie -->
  <g stroke="#2e9e63" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M256 392 L256 300"/>
    <path d="M256 300 L160 220"/>
    <path d="M256 300 L352 220"/>
    <path d="M160 220 L112 150"/>
    <path d="M160 220 L208 150"/>
    <path d="M352 220 L304 150"/>
    <path d="M352 220 L400 150"/>
  </g>
  <!-- radice -->
  <circle cx="256" cy="408" r="30" fill="url(#leaf)"/>
  <!-- rami -->
  <circle cx="256" cy="300" r="22" fill="#2e9e63"/>
  <circle cx="160" cy="220" r="20" fill="#2e9e63"/>
  <circle cx="352" cy="220" r="20" fill="#2e9e63"/>
  <!-- foglie -->
  <circle cx="112" cy="150" r="18" fill="url(#leaf)"/>
  <circle cx="208" cy="150" r="18" fill="url(#leaf)"/>
  <circle cx="304" cy="150" r="18" fill="url(#leaf)"/>
  <circle cx="400" cy="150" r="18" fill="url(#leaf)"/>
</svg>
